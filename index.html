<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cloudfare testing</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>Test page</h1>
    <p>Tämäkin on testi</p>
    <button class="button" onclick="">Click me!</button>
    <p id="tulos"></p>
    <script>
        document.getElementById("button").addEventListener("click", hello);
        async function hello() {
            const response = await fetch("/api/hello");
            const data = await response.json();
        }
        document.getElementById("tulos").textContent = data.message;
    </script>
</body>
</html>
